class_id: chaetoceros
display_name: Chaetoceros
group: Diatoms
optics: [high-mag, low-mag]
one_liner: >
  Most abundant chain-forming centric diatom in M. Bay. Cells contain long thin setae (bristles) from the valve corners; setae of neighbouring cells often cross near their base. Several species are represented in this class.

defining_characteristics: >
  Cells are joined valve-to-valve into chains with an space between adjacent valves (aperture). Each cell has two or more setae per valve. Setae are long, thin bristles arising from the corners of the valve that may or may not contain branches. In girdle view, cells are generally rectangula. Adjacent cells are connected through fused (touching) setae. Nearlly 400 species described. For planktivore, setae can be difficult to see, except for on a few species with coarser, almost spine like setae. 


distinguishing_from:
  - class: eucampia
    note: >
      Eucampia has short, blunt polar horns (not fine setae) and forms curved chains with large lens-shaped apertures. Chaetoceros setae are thin, hair-like, and usually much longer than the cell is wide.
  - class: pseudo-nitzschia
    note: >
      Pseudo-nitzschia is pennate, seta-less, and forms straight stepped ribbons of needle-like cells. If fine bristles project from the cells, it is not Pseudo-nitzschia.

