class_id: chaetoceros
display_name: Chaetoceros
group: Diatoms
optics: [high-mag, low-mag]
one_liner: >
  Chain-forming centric diatom whose cells bear long thin setae (bristles) from
  the valve corners; setae of neighbouring cells often cross near their base.

defining_characteristics: >
  Cells are joined valve-to-valve into chains, and each cell bears a pair of
  long, thin setae (bristles) arising from the corners of the valve. Setae of
  adjacent cells typically emerge near the cell junction and cross or run
  parallel, and rectangular or lens-shaped apertures (foramina) are left
  between successive cells. Features to key on: (1) fine setae projecting well
  beyond the cell body; (2) setae crossing between neighbours; (3) a defined
  chain with apertures between cells. Chaetoceros is very species-rich; label
  to genus unless a project-specific key for a distinctive species is provided.

distinguishing_from:
  - class: eucampia
    note: >
      Eucampia has short, blunt polar horns (not fine setae) and forms curved
      chains with large lens-shaped apertures. Chaetoceros setae are thin,
      hair-like, and usually much longer than the cell is wide.
  - class: pseudo-nitzschia
    note: >
      Pseudo-nitzschia is pennate, seta-less, and forms straight stepped
      ribbons of needle-like cells. If fine bristles project from the cells,
      it is not Pseudo-nitzschia.

references:
  - title: "Chaetoceros — Diatoms of North America"
    url: https://diatoms.org/genera/chaetoceros
  - title: "WHOI IFCB plankton reference (model guide)"
    url: https://whoigit.github.io/whoi-plankton/

