class_id: pseudo-nitzschia
display_name: Pseudo-nitzschia
group: Diatoms
optics: [high-mag, low-mag]
one_liner: >
  Pennate diatom forming straight, stepped colonies of narrow, needle-like cells that overlap end-to-end; a key domoic-acid (harmful bloom) genus.

defining_characteristics: >
  Cells are long, narrow, and lanceolate to spindle-shaped (needle-like), tapering to pointed ends. Cells associate into characteristic stepped colonies: each cell overlaps its neighbour by a short length at the pointed tips, so the chain looks like offset stacked needles rather than cells joined face-to-face. Features to key on: (1) Often high length-to-width ratio; (2) the stepped end-overlap between adjacent cells; (3) Two chloroplasts per cell, each on either side of the median transapical (middle) plane. Several species and sub-classes represented here that need to be identified either with molecular probes or SEM.

distinguishing_from:
  - class: chaetoceros
    note: >
      Chaetoceros is centric and bears setae; Pseudo-nitzschia is pennate, seta-less, and forms stepped overlapping ribbons of needle-like cells. Can become challening if cells are further away.


references:
  - title: "Guide to Pseudo-nitzschia — Diatoms of North America"
    url: https://diatoms.org/genera/pseudo-nitzschia/guide
  - title: "Pseudo-nitzschia — Diatoms of North America (genus)"
    url: https://diatoms.org/genera/pseudo-nitzschia

