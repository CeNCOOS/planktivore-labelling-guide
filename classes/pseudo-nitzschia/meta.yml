class_id: pseudo-nitzschia
display_name: Pseudo-nitzschia
group: Diatoms
optics: [high-mag, low-mag]
one_liner: >
  Pennate diatom forming straight, stepped colonies of narrow, needle-like
  cells that overlap end-to-end; a key domoic-acid (harmful bloom) genus.

defining_characteristics: >
  Cells are long, narrow, and lanceolate to spindle-shaped (needle- or
  blade-like), tapering to pointed ends. Cells associate into characteristic
  stepped, shingle-like colonies: each cell overlaps its neighbour by a short
  length at the pointed tips, so the chain looks like offset stacked needles
  rather than cells joined face-to-face. Features to key on: (1) very high
  length-to-width ratio; (2) the stepped end-overlap between adjacent cells;
  (3) generally straight (not curved) colonies. Species-level identification
  (e.g. the P. seriata vs P. delicatissima size groups) requires electron
  microscopy and is not expected at the annotation stage — label to genus.

distinguishing_from:
  - class: chaetoceros
    note: >
      Chaetoceros is centric and bears setae; Pseudo-nitzschia is pennate,
      seta-less, and forms stepped overlapping ribbons of needle-like cells.
  - class: eucampia
    note: >
      Eucampia forms curved/coiled chains of horned centric cells with large
      apertures. Pseudo-nitzschia colonies are straight and stepped, with no
      horns or apertures.

references:
  - title: "Guide to Pseudo-nitzschia — Diatoms of North America"
    url: https://diatoms.org/genera/pseudo-nitzschia/guide
  - title: "Pseudo-nitzschia — Diatoms of North America (genus)"
    url: https://diatoms.org/genera/pseudo-nitzschia

image_notes:
  ideal/01.png: Clear stepped colony; end-overlap between cells visible.
  ideal/02.png: Single cell showing the narrow lanceolate outline and pointed tips.
  challenging/01.png: Only two overlapping cells in frame; stepping subtle.
  challenging/02.png: Cell oriented near valve view, easy to confuse with a solitary needle.
