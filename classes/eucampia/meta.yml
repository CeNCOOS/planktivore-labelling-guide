class_id: eucampia
display_name: Eucampia
group: Diatoms
optics: [high-mag, low-mag]
one_liner: >
  Chain-forming centric diatom with two blunt polar elevations (horns); chains are coiled with large lens-shaped gaps (aperature) between cells.

defining_characteristics: >
  Cells are elliptical in girdle view and bear two blunt, broad polar elevations ("horns") at each end of the valve. Adjacent cells are joined horn-to-horn, leaving a conspicuous large, lens-shaped (biconvex) aperture between successive cells. Chains can be long or short. Because the horns are often unequal, the whole chain curves, twists, or coils rather than running straight. Key features to key on: (1) blunt, tapering horns (batman); (2) the large apertures between cells; (3) the characteristic curved or spiral chain shape. Eucampia zodiacus is the common large curved-chain form.

distinguishing_from:
  - class: chaetoceros
    note: >
      Chaetoceros bears thin, hair-like setae (bristles) that often project well beyond the cell outline and cross between neighbours. Eucampia's projections are short, blunt horns, not fine setae, and its inter-cell apertures are large and lens-shaped. The aperature shape and size is something to key on. Chaetoceros will be much smaller.
  
references:
  - title: "Eucampia — Diatoms of North America"
    url: https://diatoms.org/genera/eucampia
