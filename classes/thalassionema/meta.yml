class_id: thalassionema
display_name: Thalassionema
group: Diatoms
optics: [high-mag, low-mag]
one_liner: "Blunt, rod-shaped pennate cells joined corner-to-corner into zigzag chains or radiating star-shaped colonies."
defining_characteristics: "Cells are narrow, straight, rod- or bar-shaped with rounded to slightly swollen ends and roughly uniform width along their length. They join at their corners by small mucilage pads to form characteristic zigzag chains or radiating stellate (star) clusters. If single cell, using pennate. Key features: uniform straight bars, corner-to-corner linkage, zigzag or star colony geometry. Thalassionema nitzschioides is the common form."
distinguishing_from:
  - class: asterionellopsis
    note: "Asterionellopsis cells are clavate (club-shaped) with one inflated foot pole and taper along their length; Thalassionema cells are near-uniform bars of even width."
  - class: pseudo-nitzschia
    note: "Pseudo-nitzschia forms stepped colonies with cells overlapping along their pointed ends, not corner-linked zigzags or stars."
  - class: pennate
    note: "Use Thalassionema when the zigzag/stellate colony form is clear; fall back to Pennate if single cell."
references:
  - title: "Thalassionema — overview (ScienceDirect Topics)"
    url: https://www.sciencedirect.com/topics/agricultural-and-biological-sciences/thalassionema
image_notes:
  ideal/i1.png: Curved-spiral chain; blunt horns and lens-shaped apertures clearly visible.
  challenging/c1.png: Bunched up cells can get messy and difficult to distinguish.