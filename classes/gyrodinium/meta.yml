    url: https://en.wikipedia.org/wiki/Gyrodinium
  - title: "UCSC Ocean Data Center — Phytoplankton Gallery"
    url: http://oceandatacenter.ucsc.edu/PhytoGallery/Dinoflagellates/gyrodinium.html
 